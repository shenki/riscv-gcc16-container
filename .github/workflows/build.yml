name: Build GCC 16 RISC-V container

on:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/shenki/gcc-riscv64

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      # Register QEMU user-mode emulation so we can build a riscv64
      # container image on the x86-64 runner.
      - name: Set up QEMU binfmt
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          platforms: linux/riscv64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.run_id }}
            ${{ env.IMAGE }}:latest
